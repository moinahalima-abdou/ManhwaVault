<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Favoris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>⭐ Favoris</h1>
<div id="fav"></div>

<script>
let fav = JSON.parse(localStorage.getItem("fav")) || [];
let container = document.getElementById("fav");

fav.forEach(m => {
    container.innerHTML += `<div class='card'>
        <h3>${m.title}</h3>
        <p>${m.desc}</p>
    </div>`;
});
</script>
</body>
</html>
